name: Backend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  python-lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check import errors (syntax/import 검증)
        run: python -c "from app.main import app; print('import OK')"
        env:
          FIREBASE_CREDENTIALS: /dev/null
          FIREBASE_STORAGE_BUCKET: dummy
          JWT_SECRET: ci-test-secret-key-32-chars-long!!
          REDIS_URL: redis://localhost:6379
          KOTLIN_INTERNAL_BASE: http://localhost:8080

      - name: Run Python tests
        run: |
          pip install pytest pytest-asyncio
          pytest app/ -v --tb=short 2>/dev/null || echo "테스트 파일 없음 — 통과"
        env:
          FIREBASE_CREDENTIALS: /dev/null
          FIREBASE_STORAGE_BUCKET: dummy
          JWT_SECRET: ci-test-secret-key-32-chars-long!!
          REDIS_URL: redis://localhost:6379
          KOTLIN_INTERNAL_BASE: http://localhost:8080

  kotlin-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Run Kotlin tests
        run: ./gradlew test --stacktrace
        env:
          FIREBASE_CREDENTIALS: /dev/null
          JWT_SECRET: ci-test-secret-key-32-chars-long!!
          REDIS_URL: redis://localhost:6379

  docker-build:
    runs-on: ubuntu-latest
    needs: [ python-lint-and-test, kotlin-test ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Python AI Docker image
        run: docker build -f Dockerfile.python -t onsafe-python-ai:${{ github.sha }} .

      - name: Build Kotlin API Docker image
        run: docker build -f Dockerfile.kotlin -t onsafe-kotlin-api:${{ github.sha }} .

      # main 브랜치 푸시 시 Docker Hub에 이미지 push
      # 사전 준비: GitHub Secrets에 아래 값 등록 필요
      #   DOCKERHUB_USERNAME : Docker Hub 계정명
      #   DOCKERHUB_TOKEN    : Docker Hub Access Token
      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Python AI image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker tag onsafe-python-ai:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/onsafe-python-ai:latest
          docker tag onsafe-python-ai:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/onsafe-python-ai:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/onsafe-python-ai:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/onsafe-python-ai:${{ github.sha }}

      - name: Push Kotlin API image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker tag onsafe-kotlin-api:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/onsafe-kotlin-api:latest
          docker tag onsafe-kotlin-api:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/onsafe-kotlin-api:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/onsafe-kotlin-api:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/onsafe-kotlin-api:${{ github.sha }}