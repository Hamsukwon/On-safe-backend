spring:
  application:
    name: on-safe-backend
  profiles:
    active: local
  jackson:
    property-naming-strategy: SNAKE_CASE
  config:
    import: optional:application-secret.yml
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080

firebase:
  credentials: ${FIREBASE_CREDENTIALS:serviceAccountKey.json}

jwt:
  secret: ${JWT_SECRET:}
  access-token-expiry: 3600000
  refresh-token-expiry: 604800000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

logging:
  level:
    com.onsafe: DEBUG
