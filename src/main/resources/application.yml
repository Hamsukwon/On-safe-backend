spring:
  application:
    name: on-safe-backend
  profiles:
    active: local
  jackson:
    property-naming-strategy: SNAKE_CASE

server:
  port: 8080

firebase:
  credentials: ${FIREBASE_CREDENTIALS:serviceAccountKey.json}

jwt:
  secret: ${JWT_SECRET:on-safe-secret-key-must-be-at-least-256-bits-long}
  access-token-expiry: 3600000
  refresh-token-expiry: 604800000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

logging:
  level:
    com.onsafe: DEBUG
